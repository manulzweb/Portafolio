<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Navbar simulada -->
  <rect x="0" y="0" width="800" height="48" fill="#1a1535" opacity="0.9"/>
  <circle cx="30" cy="24" r="10" fill="url(#accent1)"/>
  <rect x="52" y="19" width="80" height="10" rx="5" fill="#a855f7" opacity="0.8"/>
  <rect x="550" y="17" width="50" height="14" rx="7" fill="#6366f1" opacity="0.6"/>
  <rect x="614" y="17" width="50" height="14" rx="7" fill="#6366f1" opacity="0.4"/>
  <rect x="678" y="17" width="50" height="14" rx="7" fill="#6366f1" opacity="0.4"/>

  <!-- Hero section -->
  <rect x="40" y="80" width="340" height="16" rx="8" fill="#a855f7" opacity="0.5"/>
  <rect x="40" y="108" width="280" height="34" rx="8" fill="white" opacity="0.9"/>
  <rect x="40" y="152" width="240" height="12" rx="6" fill="#c4b5fd" opacity="0.6"/>
  <rect x="40" y="172" width="200" height="12" rx="6" fill="#c4b5fd" opacity="0.4"/>
  <rect x="40" y="192" width="220" height="12" rx="6" fill="#c4b5fd" opacity="0.4"/>
  <rect x="40" y="224" width="110" height="36" rx="18" fill="url(#accent1)"/>
  <rect x="166" y="224" width="110" height="36" rx="18" fill="transparent" stroke="#a855f7" stroke-width="2"/>

  <!-- Avatar/foto placeholder -->
  <circle cx="600" cy="210" r="100" fill="#1a1535" stroke="url(#accent1)" stroke-width="3" filter="url(#glow1)"/>
  <circle cx="600" cy="185" r="38" fill="#302b63"/>
  <ellipse cx="600" cy="270" rx="58" ry="32" fill="#302b63"/>

  <!-- Floating cards / skill badges -->
  <rect x="430" y="68" width="80" height="28" rx="14" fill="#a855f7" opacity="0.25"/>
  <rect x="436" y="75" width="68" height="14" rx="7" fill="#a855f7" opacity="0.7"/>
  <rect x="700" y="120" width="70" height="28" rx="14" fill="#6366f1" opacity="0.25"/>
  <rect x="706" y="127" width="58" height="14" rx="7" fill="#6366f1" opacity="0.7"/>
  <rect x="450" y="320" width="90" height="28" rx="14" fill="#818cf8" opacity="0.2"/>
  <rect x="456" y="327" width="78" height="14" rx="7" fill="#818cf8" opacity="0.6"/>

  <!-- Label -->
  <rect x="0" y="408" width="800" height="42" fill="#0f0c29" opacity="0.8"/>
  <text x="400" y="434" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#c4b5fd" text-anchor="middle" opacity="0.8">Portafolio Personal · HTML · CSS · JavaScript</text>
</svg>
