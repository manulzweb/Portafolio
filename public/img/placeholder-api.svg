<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="50%" style="stop-color:#1c1003"/>
      <stop offset="100%" style="stop-color:#2d1a00"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg3)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="44" fill="#12080a" opacity="0.95"/>
  <rect x="0" y="44" width="800" height="2" fill="#f97316" opacity="0.5"/>
  <rect x="20" y="14" width="100" height="16" rx="8" fill="#f97316" opacity="0.7"/>
  <rect x="650" y="12" width="70" height="20" rx="10" fill="#f97316" opacity="0.2"/>
  <rect x="655" y="16" width="60" height="12" rx="6" fill="#f97316" opacity="0.6"/>
  <rect x="730" y="14" width="50" height="16" rx="8" fill="#1c1003"/>

  <!-- Left panel - Endpoints -->
  <rect x="0" y="46" width="230" height="404" fill="#120a02" opacity="0.85"/>
  <rect x="15" y="64" width="110" height="12" rx="6" fill="#f97316" opacity="0.6"/>
  <!-- GET /users -->
  <rect x="15" y="90" width="200" height="34" rx="6" fill="#f97316" opacity="0.15"/>
  <rect x="20" y="100" width="36" height="14" rx="7" fill="#10b981"/>
  <rect x="62" y="102" width="90" height="10" rx="5" fill="white" opacity="0.8"/>
  <!-- POST /auth -->
  <rect x="15" y="134" width="200" height="34" rx="6" fill="transparent"/>
  <rect x="20" y="144" width="38" height="14" rx="7" fill="#3b82f6"/>
  <rect x="64" y="146" width="80" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- PUT /profile -->
  <rect x="15" y="178" width="200" height="34" rx="6" fill="transparent"/>
  <rect x="20" y="188" width="34" height="14" rx="7" fill="#f59e0b"/>
  <rect x="60" y="190" width="100" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- DELETE /user/:id -->
  <rect x="15" y="222" width="200" height="34" rx="6" fill="transparent"/>
  <rect x="20" y="232" width="52" height="14" rx="7" fill="#ef4444"/>
  <rect x="78" y="234" width="90" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- GET /products -->
  <rect x="15" y="266" width="200" height="34" rx="6" fill="transparent"/>
  <rect x="20" y="276" width="36" height="14" rx="7" fill="#10b981"/>
  <rect x="62" y="278" width="110" height="10" rx="5" fill="white" opacity="0.5"/>
  <!-- POST /orders -->
  <rect x="15" y="310" width="200" height="34" rx="6" fill="transparent"/>
  <rect x="20" y="320" width="38" height="14" rx="7" fill="#3b82f6"/>
  <rect x="64" y="322" width="85" height="10" rx="5" fill="white" opacity="0.5"/>

  <!-- Right panel - Response -->
  <rect x="230" y="46" width="570" height="404" fill="#1a0e00" opacity="0.6"/>
  <!-- Request bar -->
  <rect x="240" y="60" width="550" height="38" rx="8" fill="#12080a"/>
  <rect x="248" y="72" width="36" height="14" rx="7" fill="#10b981"/>
  <rect x="292" y="74" width="260" height="10" rx="5" fill="#f97316" opacity="0.6"/>
  <!-- Send button -->
  <rect x="704" y="65" width="78" height="28" rx="14" fill="url(#accent3)"/>
  <rect x="716" y="72" width="54" height="14" rx="7" fill="white" opacity="0.9"/>

  <!-- Status bar -->
  <rect x="240" y="110" width="550" height="28" rx="6" fill="#12080a"/>
  <rect x="248" y="118" width="18" height="12" rx="3" fill="#10b981"/>
  <rect x="272" y="119" width="24" height="10" rx="5" fill="#10b981" opacity="0.8"/>
  <rect x="304" y="119" width="50" height="10" rx="5" fill="#f97316" opacity="0.5"/>
  <rect x="362" y="119" width="60" height="10" rx="5" fill="#6b7280" opacity="0.5"/>

  <!-- JSON response -->
  <rect x="240" y="150" width="550" height="285" rx="8" fill="#0d0600"/>
  <!-- JSON lines -->
  <rect x="260" y="168" width="12" height="10" rx="2" fill="#f97316" opacity="0.7"/>
  <rect x="278" y="168" width="180" height="10" rx="5" fill="#7dd3fc" opacity="0.6"/>
  <rect x="275" y="190" width="16" height="10" rx="2" fill="#f97316" opacity="0.5"/>
  <rect x="298" y="190" width="60" height="10" rx="5" fill="#fde68a" opacity="0.7"/>
  <rect x="298" y="210" width="80" height="10" rx="5" fill="#a5f3fc" opacity="0.6"/>
  <rect x="365" y="210" width="130" height="10" rx="5" fill="#86efac" opacity="0.7"/>
  <rect x="298" y="230" width="60" height="10" rx="5" fill="#a5f3fc" opacity="0.6"/>
  <rect x="365" y="230" width="200" height="10" rx="5" fill="#fde68a" opacity="0.7"/>
  <rect x="298" y="250" width="52" height="10" rx="5" fill="#a5f3fc" opacity="0.6"/>
  <rect x="357" y="250" width="90" height="10" rx="5" fill="#fda4af" opacity="0.6"/>
  <rect x="298" y="270" width="68" height="10" rx="5" fill="#a5f3fc" opacity="0.6"/>
  <rect x="373" y="270" width="110" height="10" rx="5" fill="#fde68a" opacity="0.6"/>
  <rect x="275" y="290" width="12" height="10" rx="2" fill="#f97316" opacity="0.5"/>
  <rect x="260" y="310" width="16" height="10" rx="2" fill="#f97316" opacity="0.7"/>
  <rect x="282" y="310" width="140" height="10" rx="5" fill="#7dd3fc" opacity="0.6"/>
  <rect x="275" y="330" width="16" height="10" rx="2" fill="#f97316" opacity="0.5"/>
  <rect x="298" y="330" width="80" height="10" rx="5" fill="#a5f3fc" opacity="0.6"/>
  <rect x="385" y="330" width="160" height="10" rx="5" fill="#86efac" opacity="0.6"/>
  <rect x="275" y="350" width="12" height="10" rx="2" fill="#f97316" opacity="0.5"/>
  <rect x="260" y="370" width="12" height="10" rx="2" fill="#f97316" opacity="0.7"/>

  <!-- Spring Boot badge -->
  <rect x="580" y="380" width="180" height="40" rx="20" fill="#12080a" opacity="0.8"/>
  <text x="630" y="397" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#6b7280">Powered by</text>
  <rect x="630" y="404" width="110" height="10" rx="5" fill="#f97316" opacity="0.7"/>

  <!-- Footer label -->
  <rect x="0" y="408" width="800" height="42" fill="#120800" opacity="0.9"/>
  <text x="400" y="434" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" fill="#fdba74" text-anchor="middle" opacity="0.8">API REST · Java Spring Boot · JWT Auth · PostgreSQL</text>
</svg>
